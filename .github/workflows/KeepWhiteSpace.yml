name: KeepWhiteSpace - Workflow (Moussa Montassar)

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  premier-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Installation
        run: npm ci

      - name: Test des vulnérabilités
        run: npm audit && echo "Aucune vulnérabilité, tout est ok ! 👌"

      - name: Lancement du ESLint
        run: npm run lint && echo "Vérification du code effectuée avec succès ✅"

      - name: Notif Discord en cas d'erreur
        if: failure()
        uses: tenzin1308/discord-notification@v1.0.0
        with:
          discord-webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          message: |
            🚒 Le workflow a échoué sur

            🗄️ Repository : ${{ github.repository }}

            🗿 Auteur : ${{ github.actor }}

            🪾 Branche : ${{ github.ref_name }}

            💬 Commit : ${{ github.event.head_commit.message }}

            [Voir le commit](${{ github.event.head_commit.url }})

      - name: Notification Telegram en cas d'erreur
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_ID }}
          token: ${{ secrets.TELEGRAM_API }}
          message: |
            🚒 Le workflow a échoué sur

            🗄️ Repository : ${{ github.repository }}

            🗿 Auteur : ${{ github.actor }}

            🪾 Branche : ${{ github.ref_name }}

            💬 Commit : ${{ github.event.head_commit.message }}

            [Voir le commit](${{ github.event.head_commit.url }})

