name: KeepWhiteSpace - Workflow (Moussa Montassar)

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  premier-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Installation
        run: npm ci

      - name: Test des vulnérabilités
        run: npm audit && echo "Aucune vulnérabilité, tout est ok ! 👌"

      - name: Lancement du ESLint
        run: npm run lint && echo "Vérification du code effectuée avec succès ✅"


      - name: Notif Discord en cas d'erreur
        if: failure()
        uses: appleboy/discord-action@v1.2.0
        with:

          webhook_id: ${{ secrets.WEBHOOK_ID }}
          webhook_token: ${{ secrets.WEBHOOK_TOKEN }}

          message: |
            🚒 Le workflow a échoué sur

            🗄️ Repository : ${{ github.repository }}

            🗿 Auteur : ${{ github.actor }}

            🪾 Branche : ${{ github.ref_name }}

            💬 Commit : ${{ github.event.head_commit.message }}

            [Voir le commit](${{ github.event.head_commit.url }})

            ${{ secrets.GIF }}

      - name: Notification Telegram en cas d'erreur
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_ID }}
          token: ${{ secrets.TELEGRAM_API }}
          message: |
            🚒 Le workflow a échoué sur

            🗄️ Repository : ${{ github.repository }}

            🗿 Auteur : ${{ github.actor }}

            🪾 Branche : ${{ github.ref_name }}

            💬 Commit : ${{ github.event.head_commit.message }}

            [Voir le commit](${{ github.event.head_commit.url }})



      - name: Retour des résultats
        if: always()
        run: |
            
            echo "# 🕹️ Projet W@C - JeuxVideOPS" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "## ℹ️ Informations sur le workflow" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "![Image ](https://upload.wikimedia.org/wikipedia/commons/4/43/Minimalist_info_Icon.png)" >> $GITHUB_STEP_SUMMARY
            echo "Le Jeu utiliser pour le projet est Keep White Space [GitHub](https://github.com/okzaq/js-game-keep-white-space)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Repository** : ${{ github.repository }} [Voir le repository](${{ github.event.repository.html_url }})" >> $GITHUB_STEP_SUMMARY
            echo "- **Auteur** : ${{ github.actor }} [Voir l'auteur](${{ github.event.head_commit.author.html_url }})" >> $GITHUB_STEP_SUMMARY
            echo "- **Branche** : ${{ github.ref_name }} [Voir la branche](${{ github.event.pull_request.html_url }})" >> $GITHUB_STEP_SUMMARY
            echo "- **Commit** : ${{ github.event.head_commit.message }} [Voir le commit](${{ github.event.head_commit.url }})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
